name: Architecture Governance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  governance-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        
    - name: Run Ruff (Lint & Security)
      run: |
        # Usando uv tool run para evitar instalación en el entorno del proyecto
        uv tool run ruff check . --select E,F,W,S,B --ignore S101
        
    - name: Security Check (Bandit)
      run: |
        uv tool run bandit -r src/ -x tests/
        
    - name: Check Environment Safety
      run: |
        if [ -f .env ]; then
          echo "Error: .env file found in repository. This is a security risk."
          exit 1
        fi
        
    - name: Run Architecture Tests
      run: |
        # Omitiendo sync completo por costo operativo, pero asegurando pytest
        uv tool run pytest tests/system/test_architecture.py
